# Runs the M1 acceptance test headlessly on every PR, so the human gate sees a
# green/red check alongside the diff. This is the CI mirror of the Factory's own
# QA step (belt and suspenders).
name: Godot M1 acceptance

on:
  pull_request:
  workflow_dispatch:

jobs:
  m1-acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot (headless)
        run: |
          GODOT_VERSION="4.3-stable"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          mv Godot_v${GODOT_VERSION}_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Import project (headless)
        run: godot --headless --import || true

      - name: Run M1 acceptance test
        run: godot --headless --script res://tests/test_m1.gd
